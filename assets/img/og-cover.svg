<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Top call tracking software 2026, tested and ranked across 14 platforms">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF8F5"/>
      <stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- left rail accent -->
  <rect x="0" y="0" width="14" height="630" fill="#C8553D"/>

  <!-- eyebrow -->
  <text x="80" y="135" font-family="Inter Tight, sans-serif" font-weight="700" font-size="22" fill="#C8553D" letter-spacing="6">2026 BUYER'S GUIDE</text>

  <!-- main headline -->
  <text x="80" y="225" font-family="Inter Tight, sans-serif" font-weight="800" font-size="78" fill="#1A1A1A" letter-spacing="-2">Top Call Tracking</text>
  <text x="80" y="305" font-family="Inter Tight, sans-serif" font-weight="800" font-size="78" fill="#1A1A1A" letter-spacing="-2">Software, Tested.</text>

  <!-- divider -->
  <rect x="80" y="345" width="60" height="4" fill="#C8553D"/>

  <!-- sub -->
  <text x="80" y="395" font-family="Inter, sans-serif" font-weight="500" font-size="26" fill="#3A3A3A">14 platforms ranked. 47 hours of hands-on testing.</text>
  <text x="80" y="430" font-family="Inter, sans-serif" font-weight="500" font-size="26" fill="#3A3A3A">Real campaigns. Real calls. Real attribution data.</text>

  <!-- trust strip -->
  <g transform="translate(80 510)">
    <rect x="0" y="0" width="200" height="48" rx="6" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="700" font-size="14" fill="#1A1A1A" letter-spacing="1">14 PLATFORMS</text>

    <rect x="216" y="0" width="200" height="48" rx="6" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="2"/>
    <text x="316" y="30" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="700" font-size="14" fill="#1A1A1A" letter-spacing="1">47 HOURS TESTED</text>

    <rect x="432" y="0" width="200" height="48" rx="6" fill="#C8553D"/>
    <text x="532" y="30" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="700" font-size="14" fill="#FFFFFF" letter-spacing="1">UPDATED APRIL 2026</text>
  </g>

  <!-- right side: ranked card -->
  <g transform="translate(820 130)">
    <rect x="0" y="0" width="320" height="400" rx="10" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="62" rx="10" fill="#1A1A1A"/>
    <text x="160" y="40" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="800" font-size="20" fill="#FFFFFF" letter-spacing="1">2026 RANKINGS</text>

    <text x="22" y="110" font-family="Inter Tight, sans-serif" font-weight="800" font-size="20" fill="#C8553D">1.</text>
    <text x="58" y="110" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#1A1A1A">CallScaler</text>
    <rect x="220" y="92" width="80" height="24" rx="4" fill="#C8553D"/>
    <text x="260" y="110" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="800" font-size="14" fill="#FFFFFF" letter-spacing="1">9.4</text>

    <line x1="22" y1="135" x2="298" y2="135" stroke="#E5E1D8"/>

    <text x="22" y="170" font-family="Inter Tight, sans-serif" font-weight="800" font-size="20" fill="#6B6B6B">2.</text>
    <text x="58" y="170" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#1A1A1A">CallRail</text>
    <text x="280" y="170" text-anchor="end" font-family="Inter Tight, sans-serif" font-weight="700" font-size="16" fill="#6B6B6B">8.6</text>

    <text x="22" y="220" font-family="Inter Tight, sans-serif" font-weight="800" font-size="20" fill="#6B6B6B">3.</text>
    <text x="58" y="220" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#1A1A1A">CTM</text>
    <text x="280" y="220" text-anchor="end" font-family="Inter Tight, sans-serif" font-weight="700" font-size="16" fill="#6B6B6B">8.3</text>

    <text x="22" y="270" font-family="Inter Tight, sans-serif" font-weight="800" font-size="20" fill="#6B6B6B">4.</text>
    <text x="58" y="270" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#1A1A1A">WhatConverts</text>
    <text x="280" y="270" text-anchor="end" font-family="Inter Tight, sans-serif" font-weight="700" font-size="16" fill="#6B6B6B">8.1</text>

    <text x="22" y="320" font-family="Inter Tight, sans-serif" font-weight="800" font-size="20" fill="#6B6B6B">5.</text>
    <text x="58" y="320" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#1A1A1A">Invoca</text>
    <text x="280" y="320" text-anchor="end" font-family="Inter Tight, sans-serif" font-weight="700" font-size="16" fill="#6B6B6B">7.4</text>

    <rect x="22" y="350" width="276" height="30" rx="4" fill="#FFF7EE"/>
    <text x="160" y="370" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="700" font-size="13" fill="#C8553D" letter-spacing="1">topcalltrackingsoftware.com</text>
  </g>
</svg>

<svg width="600" height="480" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Top call tracking software illustration showing a phone routing inbound calls into an attribution dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFCF6"/>
      <stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C8553D"/>
      <stop offset="1" stop-color="#A8412C"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#bg)" rx="8"/>

  <!-- Dashboard card -->
  <rect x="60" y="80" width="340" height="220" rx="8" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="1.5"/>
  <rect x="80" y="100" width="120" height="14" rx="3" fill="#1A1A1A"/>
  <rect x="80" y="124" width="80" height="8" rx="2" fill="#A8A29E" opacity=".6"/>

  <!-- Bar chart -->
  <rect x="80"  y="220" width="22" height="60" rx="2" fill="#C8553D"/>
  <rect x="112" y="200" width="22" height="80" rx="2" fill="#1A1A1A"/>
  <rect x="144" y="240" width="22" height="40" rx="2" fill="#1A1A1A" opacity=".4"/>
  <rect x="176" y="180" width="22" height="100" rx="2" fill="#C8553D" opacity=".75"/>
  <rect x="208" y="225" width="22" height="55" rx="2" fill="#1A1A1A" opacity=".55"/>
  <rect x="240" y="210" width="22" height="70" rx="2" fill="#1A1A1A" opacity=".4"/>

  <!-- Score block on dashboard -->
  <rect x="290" y="160" width="90" height="120" rx="6" fill="#FFF7EE"/>
  <text x="335" y="210" text-anchor="middle" font-family="Inter Tight, sans-serif" font-weight="800" font-size="36" fill="#1A1A1A">9.4</text>
  <text x="335" y="232" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6B6B6B">/ 10</text>
  <text x="335" y="258" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#C8553D">TOP PICK</text>

  <!-- Phone receiver -->
  <g transform="translate(420 260) rotate(-18)">
    <rect x="-26" y="-86" width="52" height="172" rx="14" fill="#1A1A1A"/>
    <rect x="-22" y="-80" width="44" height="148" rx="10" fill="#FAF8F5"/>
    <circle cx="0" cy="76" r="4" fill="#1A1A1A"/>
    <rect x="-12" y="-72" width="24" height="3" rx="1" fill="#1A1A1A" opacity=".25"/>
    <!-- screen content: ranked list -->
    <rect x="-16" y="-58" width="32" height="6" rx="1" fill="#C8553D"/>
    <rect x="-16" y="-46" width="26" height="4" rx="1" fill="#1A1A1A" opacity=".7"/>
    <rect x="-16" y="-36" width="20" height="4" rx="1" fill="#1A1A1A" opacity=".5"/>
    <rect x="-16" y="-26" width="22" height="4" rx="1" fill="#1A1A1A" opacity=".5"/>
    <rect x="-16" y="-16" width="18" height="4" rx="1" fill="#1A1A1A" opacity=".5"/>
  </g>

  <!-- Routing arc -->
  <path d="M 250 90 C 360 50 470 110 500 200" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="6 5" stroke-linecap="round"/>
  <circle cx="250" cy="90" r="6" fill="#C8553D"/>
  <circle cx="500" cy="200" r="6" fill="#C8553D"/>

  <!-- Top-pick ribbon badge -->
  <g transform="translate(110 360)">
    <rect x="0" y="0" width="180" height="42" rx="6" fill="#C8553D"/>
    <text x="14" y="27" font-family="Inter Tight, sans-serif" font-weight="800" font-size="13" letter-spacing="2" fill="#FFFFFF">2026 TOP PICK · 9.4/10</text>
  </g>

  <!-- 14 platforms tag -->
  <g transform="translate(310 360)">
    <rect x="0" y="0" width="180" height="42" rx="6" fill="#FFFFFF" stroke="#E5E1D8" stroke-width="1.5"/>
    <text x="14" y="27" font-family="Inter Tight, sans-serif" font-weight="700" font-size="13" letter-spacing="1.5" fill="#1A1A1A">14 PLATFORMS · 47 HOURS</text>
  </g>
</svg>
